<header>
    <nav>
        {% if page.url != "/" %}
            <a href="/" class="back-button"><i class="fa-solid fa-arrow-left"></i></a>
        {% endif %}
        <h1>{{ page.title }}</h1>
    </nav>
    <nav>
        {% if page.url == "/" %}
            <a href="https://x.com/0xblz" target="_blank" class="social-link"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://codepen.io/0xblz" target="_blank" class="social-link"><i class="fa-brands fa-codepen"></i></a>
            <a href="https://forms.gle/2tDqRA8P79LEguBt8" target="_blank" class="social-link"><i class="fa-solid fa-envelope"></i></a>
        {% else %}
            <p>{{ page.description }}</p>
        {% endif %}
    </nav>
</header>
