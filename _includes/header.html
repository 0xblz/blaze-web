<div class="top-bar">
    <div>
        {% if page.url == "/" %}
            <div class="avatar">
                <img src="{{ site.baseurl }}/assets/images/avatar.jpg" alt="avatar" />
                <h1 class="glitch-effect">{{ page.title }}</h1>
            </div>
        {% else %}
            <h1>{{ page.title }}</h1>
        {% endif %}
    </div>
    <div>
        <div>
            <h5>
                <i class="fa-solid fa-wifi" id="wifiStatus"></i>
                <small>
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </small>
                <i class="fa-solid fa-memory"></i>
                <span id="memoryUsage">--</span>
                <small>
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </small>
                <i class="fa-solid fa-bolt pulse"></i>
            </h5>
        </div>
        <div class="hide">
            <h5>
                <i class="fa-solid fa-calendar-days"></i>
                <!-- Date will be inserted by JavaScript -->
            </h5>
        </div>
        <div class="hide">
            <h5>
                <i class="fa-solid fa-clock"></i>
                <!-- Time will be inserted by JavaScript -->
            </h5>
        </div>
    </div>
</div>
