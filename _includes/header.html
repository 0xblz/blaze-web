<header>
    {% if page.url != "/" %}
        <a href="/" class="back-button"><i class="fa-solid fa-arrow-left"></i></a>
    {% endif %}
    <nav>
        <div class="avatar">
           {% if page.url == "/" %}<img src="{{ site.baseurl }}/assets/images/avatar.jpg" alt="avatar" />{% endif %}
            <h1>{{ page.title }}</h1>
        </div>
    </nav>
    <nav>
        {% if page.url == "/" %}
            <h2>{{ page.short_description }}</h2>
        {% else %}
            <p>{{ page.description }}</p>
        {% endif %}
    </nav>
</header>
