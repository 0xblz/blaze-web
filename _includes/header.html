<div class="top-bar">
    <div>
        {% if page.url == "/" %}
            <div class="avatar">
                <img src="{{ site.baseurl }}/assets/images/avatar.jpg" alt="avatar" />
                <h1 class="glitch-effect">{{ page.title }}</h1>
            </div>
        {% else %}
            <h1>{{ page.title }}</h1>
        {% endif %}
    </div>
    <div>
        <div class="hide">
            <h2>
                <i class="fa-solid fa-moon"></i>
            </h2>
        </div>
        <div class="hide">
            <h2>
                <i class="fa-solid fa-calendar-days"></i>
                <!-- Date will be inserted by JavaScript -->
            </h2>
        </div>
        <div>
            <h2>
                <i class="fa-solid fa-clock"></i>
                <!-- Time will be inserted by JavaScript -->
            </h2>
        </div>
    </div>
</div>
