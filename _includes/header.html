<header>
    {% if page.url != "/" %}
        <a href="/" class="back-button"><i class="fa-solid fa-arrow-left"></i></a>
    {% endif %}
    <nav>
        <nav>
            {% if page.url == "/" %}
                <div class="avatar">
                    <img src="{{ site.baseurl }}/assets/images/avatar.jpg" alt="avatar" />
                    <h1>{{ page.title }}</h1>
                </div>
            {% else %}
                <h1>{{ page.title }}</h1>
            {% endif %}
        </nav>
        <nav>
            {% if page.url == "/" %}
                <h2>{{ page.short_description }}</h2>
            {% else %}
                <p>{{ page.description }}</p>
            {% endif %}
        </nav>
    </nav>
</header>
