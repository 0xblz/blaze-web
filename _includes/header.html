<header>
    {% if page.url == "/" %}
        <nav class="logo">
            <div class="avatar"><img src="{{ site.baseurl }}/assets/images/marble.png"/></div>
            <h3>{{ site.title }}</h3>
        </nav>
        <nav>
            <p><a href="https://x.com/0xblz" target="_blank"><i class="fa-brands fa-x-twitter"></i></a></p>
            <p><a href="https://forms.gle/2tDqRA8P79LEguBt8" target="_blank"><i class="fa-solid fa-envelope"></i></a></p>
        </nav>
    {% else %}
        <nav>
            <a href="/" class="back-button"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>{{ page.title }}</h2>
        </nav>
        <nav>
            <p>{{ page.description }}</p>
        </nav>
    {% endif %}
</header>
