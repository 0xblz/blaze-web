<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ page.title }} - {{ page.short_description }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% endif %}">
    <link rel="icon" type="image/jpg" href="{{ site.baseurl }}/assets/images/avatar.jpg">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
    <script src="https://kit.fontawesome.com/53df3a2a07.js" crossorigin="anonymous"></script>
    
    {% if page.url == "/" %}
    <!-- Add jQuery and jQuery UI -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    
    <!-- Add Tippy.js -->
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light.css">
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale.css">

    <!-- Add draggable.js -->
    <script src="{{ '/assets/js/draggable.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/date.js' | relative_url }}"></script>
    {% endif %}
</head>
<body class="{% if page.custom_css %}{{ page.custom_css }}{% endif %}">
    <main>
        {% if page.url == "/" %}
            {% include header.html %}
        {% endif %}
        {{ content }}
        {% if page.url == "/" %}
            {% include footer.html %}
        {% endif %}
    </main>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-355V4GHGSF"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-355V4GHGSF');
    </script>
    
    {% if page.js_file %}
        <script src="/assets/js/{{ page.js_file }}.js"></script>
    {% endif %}
    
    {% if page.url == "/" %}
        <script src="{{ '/assets/js/memory.js' | relative_url }}"></script>
        <script src="{{ '/assets/js/wifi.js' | relative_url }}"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                tippy('[data-tippy-content]', {
                    placement: 'top',
                    animation: 'scale',
                    arrow: true,
                    duration: 200
                });
            });
        </script>
    {% endif %}
</body>
</html>
