<div id="soundcloudPlayer" class="soundcloud-player">
    <div class="soundcloud-handle"><i class="fa-solid fa-grip"></i></div>
    <iframe 
        width="100%" 
        height="100%" 
        scrolling="no" 
        frameborder="no" 
        allow="autoplay" 
        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/compilerbau/neon-drive-84-album-edit&color=%23ff5500&auto_play=true&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true">
    </iframe>
</div>

<div class="desktop">
    {% for project in site.data.projects %}
    <a href="{{ project.link }}" 
       {% if project.external_link %}
           target="_blank"
       {% else %}
           data-internal-page="{{ project.link }}"
           data-page-title="{{ project.title }}"
       {% endif %} 
       class="shortcut"
       {% if project.role %}data-tippy-content="{{ project.role }}"{% endif %}>
        <div class="shortcut-content">
            <figure>
                {% if project.external_link %}
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                {% endif %}
                <img src="{{ project.image }}" alt="{{ project.title }}" />
            </figure>
            <h3>{{ project.title }}<br><small>{{ project.type }}</small></h3>
        </div>
    </a>
    {% endfor %}
</div>
